<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Savor — Restaurants</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<style>
.hero-bar { background: var(--dark); padding: 4rem 3rem; }
.hero-inner { max-width: 1200px; margin: 0 auto; }
.hero-bar h1 { font-family: var(--font-display); font-size: 2.8rem; color: white; margin-bottom: 0.4rem; }
.hero-bar h1 em { color: var(--amber-light); font-style: italic; }
.hero-bar p { color: rgba(253,246,236,0.5); margin-bottom: 1.8rem; }
.search-row { display: flex; gap: 0.8rem; max-width: 600px; }
.search-row input { flex: 1; padding: 0.8rem 1.1rem; border: none; border-radius: 3px 0 0 3px; font-family: var(--font-body); font-size: 0.93rem; outline: none; }
.search-row button { padding: 0.8rem 1.5rem; background: var(--amber); color: white; border: none; border-radius: 0 3px 3px 0; cursor: pointer; font-family: var(--font-body); font-weight: 500; white-space: nowrap; }
.search-row button:hover { background: var(--rust); }
.main { max-width: 1200px; margin: 0 auto; padding: 2.5rem 3rem; }
.filter-bar { display: flex; gap: 0.6rem; margin-bottom: 2.5rem; flex-wrap: wrap; align-items: center; }
.filter-label { font-size: 0.78rem; text-transform: uppercase; letter-spacing: 0.08em; color: var(--warm-gray); margin-right: 0.3rem; }
.filter-btn { padding: 0.4rem 1rem; border: 1.5px solid var(--border); border-radius: 20px; background: white; cursor: pointer; font-family: var(--font-body); font-size: 0.82rem; color: var(--warm-gray); transition: all 0.2s; }
.filter-btn:hover, .filter-btn.active { background: var(--amber); color: white; border-color: var(--amber); }
.results-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; }
.results-count { font-size: 0.88rem; color: var(--warm-gray); }
.grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(310px, 1fr)); gap: 1.5rem; }
.r-card { background: white; border-radius: 6px; overflow: hidden; border: 1px solid rgba(200,118,42,0.1); transition: transform 0.25s, box-shadow 0.25s; cursor: pointer; }
.r-card:hover { transform: translateY(-4px); box-shadow: 0 12px 40px rgba(26,16,8,0.12); }
.r-img { height: 155px; display: flex; align-items: center; justify-content: center; font-size: 3.2rem; background: linear-gradient(135deg, #2A1A0A, #4A2A10); position: relative; }
.r-status { position: absolute; top: 10px; right: 10px; }
.r-body { padding: 1.2rem; }
.r-name { font-family: var(--font-display); font-size: 1.1rem; font-weight: 700; margin-bottom: 0.25rem; }
.r-meta { display: flex; align-items: center; gap: 1rem; color: var(--warm-gray); font-size: 0.8rem; margin-bottom: 0.9rem; }
.r-rating { color: var(--amber); font-weight: 600; }
.r-footer { display: flex; gap: 0.5rem; padding-top: 0.9rem; border-top: 1px solid rgba(200,118,42,0.1); }
.cuisine-tag { display: inline-block; background: rgba(200,118,42,0.08); color: var(--amber); font-size: 0.72rem; padding: 0.18rem 0.5rem; border-radius: 2px; }
/* Add restaurant floating button */
.fab { position: fixed; bottom: 2rem; right: 2rem; background: var(--amber); color: white; padding: 0.8rem 1.4rem; border-radius: 3px; border: none; cursor: pointer; font-family: var(--font-body); font-weight: 500; font-size: 0.88rem; box-shadow: 0 4px 20px rgba(200,118,42,0.4); display: none; transition: background 0.2s; z-index: 50; }
.fab:hover { background: var(--rust); }
</style>
</head>
<body>

<div id="nav-placeholder"></div>

<div class="hero-bar">
  <div class="hero-inner">
    <h1>Find <em>great food</em> near you</h1>
    <p>Browse from hundreds of restaurants and place your order in seconds</p>
    <div class="search-row">
      <input type="text" id="search-input" placeholder="Search by name or cuisine..." onkeydown="if(event.key==='Enter')doSearch()">
      <button onclick="doSearch()">Search</button>
    </div>
  </div>
</div>

<div class="main">
  <div class="filter-bar">
    <span class="filter-label">Filter:</span>
    <button class="filter-btn active" onclick="loadOpen(this)">🟢 Open Now</button>
    <button class="filter-btn" onclick="loadAll(this)">All</button>
    <button class="filter-btn" onclick="loadByCuisine('Indian',this)">🍛 Indian</button>
    <button class="filter-btn" onclick="loadByCuisine('Chinese',this)">🥡 Chinese</button>
    <button class="filter-btn" onclick="loadByCuisine('Italian',this)">🍕 Italian</button>
    <button class="filter-btn" onclick="loadByCuisine('Continental',this)">🥗 Continental</button>
    <button class="filter-btn" onclick="loadByCuisine('South Indian',this)">🥘 South Indian</button>
  </div>

  <div class="results-bar">
    <div class="results-count" id="results-count">Loading restaurants...</div>
    <div id="admin-add-btn"></div>
  </div>

  <div class="grid" id="restaurants-grid">
    <div class="loading-state" style="grid-column:1/-1"><div class="spinner"></div><br><br>Loading restaurants...</div>
  </div>
</div>

<button class="fab" id="fab-btn" onclick="openAddModal()">+ Add Restaurant</button>

<!-- Add Restaurant Modal -->
<div class="modal-backdrop" id="add-modal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title">Add Restaurant</div>
      <button class="modal-close" onclick="closeModal()">×</button>
    </div>
    <div class="form-group"><label>Restaurant Name *</label><input id="m-name" placeholder="Spice Garden"></div>
    <div class="form-group"><label>Cuisine Type *</label><input id="m-cuisine" placeholder="Indian, Chinese, Italian..."></div>
    <div class="form-group"><label>Address *</label><input id="m-address" placeholder="123 MG Road, Bangalore"></div>
    <div class="form-group"><label>Phone *</label><input id="m-phone" placeholder="9876543210" type="tel"></div>
    <div class="modal-actions">
      <button class="btn btn-outline btn-full" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary btn-full" onclick="saveRestaurant()" id="save-btn">Add Restaurant</button>
    </div>
    <div class="alert" id="modal-alert"></div>
  </div>
</div>

<div id="footer-placeholder"></div>

<script src="shared.js"></script>
<script>
document.getElementById('nav-placeholder').innerHTML = getNav('restaurants.html');
document.getElementById('footer-placeholder').innerHTML = getFooter();
renderNavUser();

const emojis = ['🍛','🍜','🍕','🥘','🍱','🌮','🍣','🥗','🫕','🍲','🥙','🍔'];
let allRestaurants = [];

function renderGrid(list) {
  const grid = document.getElementById('restaurants-grid');
  document.getElementById('results-count').textContent = list.length + ' restaurant' + (list.length!==1?'s':'') + ' found';
  if (!list.length) {
    grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1"><div class="empty-icon">🍽️</div><div class="empty-title">No restaurants found</div><p>Try a different filter or search term</p></div>`;
    return;
  }
  grid.innerHTML = list.map((r, i) => `
    <div class="r-card" onclick="goToOrder(${r.id})">
      <div class="r-img">${emojis[i % emojis.length]}
        <div class="r-status"><span class="badge ${r.isOpen ? 'badge-green' : 'badge-red'}">${r.isOpen ? '● Open' : '● Closed'}</span></div>
      </div>
      <div class="r-body">
        <div class="r-name">${r.name}</div>
        <div class="r-meta">
          <span class="r-rating">★ ${r.rating > 0 ? r.rating : 'New'}</span>
          <span>${r.cuisine}</span>
          ${r.phone ? `<span>${r.phone}</span>` : ''}
        </div>
        <div style="margin-bottom:0.9rem"><span class="cuisine-tag">${r.cuisine}</span></div>
        <div class="r-footer">
          <button class="btn btn-dark btn-sm" onclick="event.stopPropagation();goToMenu(${r.id})">View Menu</button>
          <button class="btn btn-primary btn-sm" onclick="event.stopPropagation();goToOrder(${r.id})" ${!r.isOpen?'disabled style="opacity:0.5;cursor:not-allowed"':''}>Order Now</button>
        </div>
      </div>
    </div>`).join('');
}

async function fetchAndRender(url) {
  const grid = document.getElementById('restaurants-grid');
  grid.innerHTML = '<div class="loading-state" style="grid-column:1/-1"><div class="spinner"></div><br><br>Loading...</div>';
  try {
	  const { ok, status, data } = await api('GET', url);
	  
	  console.log("STATUS =", status);
	  console.log("OK =", ok);
	  console.log("DATA =", data);
    if (ok) { allRestaurants = data.data || []; renderGrid(allRestaurants); }
    else { grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1"><div class="empty-icon">😕</div><div class="empty-title">${data.message || 'No results'}</div></div>`; document.getElementById('results-count').textContent = '0 restaurants'; }
  } catch { grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1"><div class="empty-icon">⚠️</div><div class="empty-title">Cannot connect to server</div><p>Make sure Spring Boot is running on port 8080</p></div>`; document.getElementById('results-count').textContent = 'Error'; }
}

function setFilter(btn) { document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active')); btn.classList.add('active'); }
function loadOpen(btn) { setFilter(btn); fetchAndRender('/restaurant/open'); }
function loadAll(btn) { setFilter(btn); fetchAndRender('/restaurant/all'); }
function loadByCuisine(c, btn) { setFilter(btn); fetchAndRender('/restaurant/cuisine/' + encodeURIComponent(c)); }
function doSearch() { const q = document.getElementById('search-input').value.trim(); if (q) fetchAndRender('/restaurant/search/' + encodeURIComponent(q)); else loadOpen(document.querySelector('.filter-btn')); }
function goToOrder(id) { window.location.href = 'order.html?restaurantId=' + id; }
function goToMenu(id) { window.location.href = 'menu.html?restaurantId=' + id; }

// Show add button for admins
const user = getUser();
if (user && (user.role === 'RESTAURANT_ADMIN' || user.role === 'ADMIN')) {
  document.getElementById('fab-btn').style.display = 'block';
}

function openAddModal() { document.getElementById('add-modal').classList.add('open'); }
function closeModal() { document.getElementById('add-modal').classList.remove('open'); }

async function saveRestaurant() {
  const name = document.getElementById('m-name').value.trim();
  const cuisine = document.getElementById('m-cuisine').value.trim();
  const address = document.getElementById('m-address').value.trim();
  const phone = document.getElementById('m-phone').value.trim();
  const alertEl = document.getElementById('modal-alert');

  if (!name || !cuisine || !address || !phone) {
    alertEl.textContent = 'Please fill in all fields'; alertEl.className = 'alert show alert-error'; return;
  }

  const btn = document.getElementById('save-btn');
  btn.disabled = true; btn.textContent = 'Saving...';
  try {
    const { ok, data } = await api('POST', '/restaurant/add', { name, cuisine, address, phone });
    if (ok) {
      alertEl.textContent = '✓ Restaurant added successfully!'; alertEl.className = 'alert show alert-success';
      setTimeout(() => { closeModal(); loadOpen(document.querySelector('.filter-btn.active') || document.querySelector('.filter-btn')); btn.disabled = false; btn.textContent = 'Add Restaurant'; document.getElementById('modal-alert').className = 'alert'; ['m-name','m-cuisine','m-address','m-phone'].forEach(id => document.getElementById(id).value = ''); }, 1200);
    } else {
      alertEl.textContent = data.message || 'Failed to add restaurant'; alertEl.className = 'alert show alert-error';
      btn.disabled = false; btn.textContent = 'Add Restaurant';
    }
  } catch {
    alertEl.textContent = 'Server not connected'; alertEl.className = 'alert show alert-error';
    btn.disabled = false; btn.textContent = 'Add Restaurant';
  }
}

// Initial load
loadOpen(document.querySelector('.filter-btn'));
</script>
</body>
</html>
