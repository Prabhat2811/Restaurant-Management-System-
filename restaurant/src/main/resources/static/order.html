<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Savor — Place Order</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<style>
.page-layout { display: grid; grid-template-columns: 1fr 360px; gap: 2rem; max-width: 1200px; margin: 2rem auto; padding: 0 2rem; align-items: start; }
.menu-section {}
.restaurant-header { background: var(--dark); border-radius: 6px; padding: 1.8rem; margin-bottom: 1.5rem; display: flex; justify-content: space-between; align-items: center; }
.rh-name { font-family: var(--font-display); font-size: 1.5rem; color: white; margin-bottom: 0.3rem; }
.rh-meta { display: flex; gap: 1.2rem; font-size: 0.82rem; color: rgba(255,255,255,0.5); }
.rh-rating { color: var(--amber-light); font-weight: 600; }
.cat-tabs { display: flex; gap: 0.5rem; flex-wrap: wrap; margin-bottom: 1.5rem; }
.cat-tab { padding: 0.4rem 1rem; border: 1.5px solid var(--border); border-radius: 20px; background: white; cursor: pointer; font-size: 0.82rem; color: var(--warm-gray); transition: all 0.2s; }
.cat-tab.active, .cat-tab:hover { background: var(--amber); color: white; border-color: var(--amber); }
.menu-items { display: flex; flex-direction: column; gap: 0.8rem; }
.menu-item { background: white; border-radius: 4px; padding: 1.1rem 1.2rem; display: flex; justify-content: space-between; align-items: center; border: 1px solid rgba(200,118,42,0.08); transition: border-color 0.2s; }
.menu-item:hover { border-color: rgba(200,118,42,0.3); }
.mi-info {}
.mi-name { font-weight: 500; font-size: 0.93rem; margin-bottom: 0.2rem; }
.mi-desc { color: var(--warm-gray); font-size: 0.78rem; margin-bottom: 0.4rem; }
.mi-price { color: var(--amber); font-weight: 600; font-size: 0.95rem; }
.mi-unavail { font-size: 0.72rem; color: #ef4444; margin-left: 0.5rem; }
.qty-ctrl { display: flex; align-items: center; gap: 0.5rem; flex-shrink: 0; }
.qty-btn { width: 30px; height: 30px; border-radius: 50%; border: 1.5px solid var(--amber); background: transparent; color: var(--amber); cursor: pointer; font-size: 1.1rem; display: flex; align-items: center; justify-content: center; transition: all 0.2s; font-family: var(--font-body); }
.qty-btn:hover { background: var(--amber); color: white; }
.qty-btn:disabled { opacity: 0.4; cursor: default; }
.qty-num { min-width: 24px; text-align: center; font-size: 0.9rem; font-weight: 600; }
.add-btn { padding: 0.38rem 0.9rem; background: rgba(200,118,42,0.1); color: var(--amber); border: 1.5px solid rgba(200,118,42,0.3); border-radius: 3px; cursor: pointer; font-size: 0.82rem; font-weight: 500; font-family: var(--font-body); transition: all 0.2s; white-space: nowrap; }
.add-btn:hover { background: var(--amber); color: white; border-color: var(--amber); }
.add-btn:disabled { opacity: 0.4; cursor: not-allowed; }

/* ── Cart panel ── */
.cart-panel {
  background: white; border-radius: 6px; border: 1px solid rgba(200,118,42,0.15);
  position: sticky; top: 80px; overflow: hidden;
}
.cart-header {
  background: var(--dark); padding: 1rem 1.3rem;
  display: flex; justify-content: space-between; align-items: center;
}
.cart-title { font-family: var(--font-display); font-size: 1rem; font-weight: 700; color: white; }
.cart-badge { background: var(--amber); color: white; width: 24px; height: 24px; border-radius: 50%; font-size: 0.75rem; display: flex; align-items: center; justify-content: center; font-weight: 700; }
.cart-restaurant { padding: 0.7rem 1.2rem; background: rgba(200,118,42,0.06); border-bottom: 1px solid var(--border); font-size: 0.78rem; color: var(--warm-gray); }
.cart-restaurant strong { color: var(--dark); }
.cart-body { max-height: 280px; overflow-y: auto; padding: 0.5rem 0; }
.cart-item-row { display: flex; justify-content: space-between; align-items: center; padding: 0.55rem 1.2rem; gap: 0.5rem; }
.ci-name { font-size: 0.83rem; font-weight: 500; flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.ci-qty { color: var(--warm-gray); font-size: 0.75rem; flex-shrink: 0; margin: 0 0.3rem; }
.ci-price { color: var(--amber); font-weight: 600; font-size: 0.85rem; flex-shrink: 0; }
.ci-remove { background: none; border: none; cursor: pointer; color: var(--warm-gray); font-size: 0.85rem; flex-shrink: 0; transition: color 0.15s; }
.ci-remove:hover { color: #ef4444; }
.cart-empty-msg { text-align: center; padding: 2rem 1rem; color: var(--warm-gray); font-size: 0.83rem; }
.cart-empty-msg .ce-icon { font-size: 2rem; margin-bottom: 0.5rem; }
.cart-totals { border-top: 1.5px solid var(--border); padding: 1rem 1.2rem; }
.total-row { display: flex; justify-content: space-between; font-size: 0.83rem; margin-bottom: 0.35rem; }
.total-row.grand { font-family: var(--font-display); font-size: 1.1rem; font-weight: 700; color: var(--amber); margin-top: 0.6rem; padding-top: 0.6rem; border-top: 1px dashed var(--border); }

/* Checkout section (logged in) */
.cart-checkout { padding: 1rem 1.2rem; border-top: 1px solid var(--border); display: flex; flex-direction: column; gap: 0.7rem; }
.cart-checkout select {
  width: 100%; padding: 0.6rem 0.8rem; border: 1.5px solid var(--border); border-radius: 4px;
  font-family: var(--font-body); font-size: 0.85rem; outline: none; transition: border-color 0.2s;
}
.cart-checkout select:focus { border-color: var(--amber); }

/* Login prompt (not logged in) */
.cart-login-prompt { padding: 1rem 1.2rem; border-top: 1px solid var(--border); text-align: center; }
.cart-login-prompt .lock-icon { font-size: 1.6rem; margin-bottom: 0.4rem; }
.cart-login-prompt p { font-size: 0.82rem; color: var(--warm-gray); margin-bottom: 0.75rem; line-height: 1.5; }

.alert { padding: 0.65rem 0.9rem; border-radius: 4px; font-size: 0.82rem; display: none; }
.alert.show { display: block; }
.alert-success { background: #F0FDF4; border: 1px solid #BBF7D0; color: #166534; }
.alert-error { background: #FEF2F2; border: 1px solid #FECACA; color: #991B1B; }

/* Order success */
.order-success { display: none; padding: 1.5rem; text-align: center; }
.os-icon { font-size: 2.5rem; margin-bottom: 0.6rem; }
.os-title { font-family: var(--font-display); font-size: 1.1rem; font-weight: 700; color: #065F46; margin-bottom: 0.3rem; }
.os-sub { color: var(--warm-gray); font-size: 0.82rem; margin-bottom: 1rem; }
</style>
</head>
<body>
<div id="nav-placeholder"></div>

<div class="page-layout">
  <!-- LEFT: Menu -->
  <div class="menu-section">
    <div class="restaurant-header" id="restaurant-header">
      <div>
        <div class="rh-name" id="rh-name">Loading...</div>
        <div class="rh-meta">
          <span class="rh-rating" id="rh-rating">★ —</span>
          <span id="rh-cuisine">—</span>
          <span id="rh-status">—</span>
        </div>
      </div>
      <div>
        <a href="restaurants.html" style="color:rgba(253,246,236,0.5);font-size:0.82rem;text-decoration:none">← All Restaurants</a>
      </div>
    </div>

    <div class="cat-tabs" id="cat-tabs"></div>
    <div class="menu-items" id="menu-items">
      <div class="loading-state"><div class="spinner"></div><br><br>Loading menu...</div>
    </div>
  </div>

  <!-- RIGHT: Cart -->
  <div class="cart-panel" id="cart-panel">
    <div class="cart-header">
      <div class="cart-title">Your Cart</div>
      <div class="cart-badge" id="cart-badge">0</div>
    </div>

    <div class="cart-restaurant" id="cart-rest-name" style="display:none">
      Ordering from <strong id="cart-rest-label">—</strong>
    </div>

    <div class="cart-body" id="cart-body">
      <div class="cart-empty-msg">
        <div class="ce-icon">🛒</div>
        <div>Browse the menu and add items</div>
      </div>
    </div>

    <div class="cart-totals" id="cart-totals" style="display:none">
      <div class="total-row"><span>Subtotal</span><span id="subtotal">₹0</span></div>
      <div class="total-row"><span>Delivery fee</span><span>₹40</span></div>
      <div class="total-row"><span>Taxes (5%)</span><span id="tax">₹0</span></div>
      <div class="total-row grand"><span>Total</span><span id="grand-total">₹40</span></div>
    </div>

    <!-- Shown when logged in and cart has items -->
    <div class="cart-checkout" id="cart-checkout" style="display:none">
      <select id="payment-method">
        <option value="UPI">UPI</option>
        <option value="CREDIT_CARD">Credit Card</option>
        <option value="DEBIT_CARD">Debit Card</option>
        <option value="NET_BANKING">Net Banking</option>
        <option value="CASH">Cash on Delivery</option>
      </select>
      <button class="btn btn-primary btn-full" id="place-btn" onclick="placeOrder()">Place Order →</button>
      <div class="alert" id="order-alert"></div>
    </div>

    <!-- Shown when NOT logged in and cart has items -->
    <div class="cart-login-prompt" id="cart-login-prompt" style="display:none">
      <div class="lock-icon">🔒</div>
      <p>Please sign in to place your order</p>
      <button class="btn btn-dark btn-full" onclick="saveCartAndRedirectToLogin()">Sign In to Order</button>
    </div>

    <!-- Order success -->
    <div class="order-success" id="order-success">
      <div class="os-icon">🎉</div>
      <div class="os-title">Order Placed!</div>
      <div class="os-sub" id="os-sub">Your order is confirmed</div>
      <a href="orders.html" class="btn btn-primary btn-sm" style="margin-right:0.5rem">Track Order</a>
      <button class="btn btn-outline btn-sm" onclick="resetOrder()">New Order</button>
    </div>
  </div>
</div>

<div id="footer-placeholder"></div>

<script src="shared.js"></script>
<script>
document.getElementById('nav-placeholder').innerHTML = getNav('restaurants.html');
document.getElementById('footer-placeholder').innerHTML = getFooter();
renderNavUser();

// ── Auth ──
const user = getUser();
const isLoggedIn = !!(user && user.id);

const params = new URLSearchParams(window.location.search);
const restaurantId = parseInt(params.get('restaurantId'));
if (!restaurantId) window.location.href = 'restaurants.html';

let cart = {};
let allItems = [];

async function loadRestaurant() {
  try {
    const { ok, data } = await api('GET', '/restaurant/' + restaurantId);
    if (ok) {
      const r = data.data;
      document.getElementById('rh-name').textContent = r.name;
      document.getElementById('rh-rating').textContent = '★ ' + (r.rating > 0 ? r.rating : 'New');
      document.getElementById('rh-cuisine').textContent = r.cuisine;
      document.getElementById('rh-status').innerHTML = `<span class="badge ${r.isOpen ? 'badge-green' : 'badge-red'}">${r.isOpen ? 'Open' : 'Closed'}</span>`;
      document.getElementById('cart-rest-label').textContent = r.name;
      document.title = 'Savor — ' + r.name;
    }
  } catch {}
}

async function loadMenu() {
  const container = document.getElementById('menu-items');
  try {
    const { ok, data } = await api('GET', '/menu/restaurant/' + restaurantId);
    if (!ok || !data.data?.length) {
      container.innerHTML = '<div class="empty-state"><div class="empty-icon">📋</div><div class="empty-title">No menu items yet</div></div>';
      return;
    }
    allItems = data.data;
    const categories = [...new Set(allItems.map(i => i.categoryName || 'Menu'))];

    const catDiv = document.getElementById('cat-tabs');
    catDiv.innerHTML = ['All', ...categories].map((c, i) =>
      `<div class="cat-tab ${i === 0 ? 'active' : ''}" onclick="filterCat('${c}', this)">${c}</div>`
    ).join('');

    renderItems(allItems);
    updateCart(); // reflect any cart restored from sessionStorage
  } catch {
    container.innerHTML = '<div class="empty-state"><div class="empty-icon">⚠️</div><div class="empty-title">Failed to load menu</div></div>';
  }
}

function filterCat(cat, btn) {
  document.querySelectorAll('.cat-tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  renderItems(cat === 'All' ? allItems : allItems.filter(i => (i.categoryName || 'Menu') === cat));
}

function renderItems(items) {
  document.getElementById('menu-items').innerHTML = items.map(item => `
    <div class="menu-item" id="item-${item.id}">
      <div class="mi-info">
        <div class="mi-name">${item.name}${item.available === false ? '<span class="mi-unavail">(Unavailable)</span>' : ''}</div>
        ${item.description ? `<div class="mi-desc">${item.description}</div>` : ''}
        <div class="mi-price">₹${item.price}</div>
      </div>
      <div class="qty-ctrl" id="ctrl-${item.id}">
        ${renderCtrl(item)}
      </div>
    </div>`).join('');
}

function renderCtrl(item) {
  const qty = cart[item.id]?.qty || 0;
  if (qty === 0) {
    return `<button class="add-btn" onclick="addItem(${item.id},'${escStr(item.name)}',${item.price})" ${item.available === false ? 'disabled' : ''}>Add +</button>`;
  }
  return `
    <button class="qty-btn" onclick="changeQty(${item.id},-1)">−</button>
    <span class="qty-num">${qty}</span>
    <button class="qty-btn" onclick="changeQty(${item.id},1)">+</button>`;
}

function escStr(s) { return s.replace(/'/g, "\\'"); }

function addItem(id, name, price) {
  cart[id] = { id, name, price, qty: 1 };
  refreshCtrl(id);
  updateCart();
}

function changeQty(id, delta) {
  if (!cart[id]) return;
  cart[id].qty += delta;
  if (cart[id].qty <= 0) delete cart[id];
  const item = allItems.find(i => i.id === id);
  if (item) document.getElementById('ctrl-' + id).innerHTML = renderCtrl(item);
  updateCart();
}

function refreshCtrl(id) {
  const item = allItems.find(i => i.id === id);
  if (item) document.getElementById('ctrl-' + id).innerHTML = renderCtrl(item);
}

// ── Update cart UI ──
function updateCart() {
  const items = Object.values(cart);
  const count = items.reduce((s, i) => s + i.qty, 0);
  const subtotal = items.reduce((s, i) => s + i.price * i.qty, 0);
  const tax = Math.round(subtotal * 0.05);
  const total = subtotal + 40 + tax;

  document.getElementById('cart-badge').textContent = count;

  const body = document.getElementById('cart-body');
  const totals = document.getElementById('cart-totals');
  const checkout = document.getElementById('cart-checkout');
  const loginPrompt = document.getElementById('cart-login-prompt');
  const restName = document.getElementById('cart-rest-name');

  if (!items.length) {
    body.innerHTML = `<div class="cart-empty-msg"><div class="ce-icon">🛒</div><div>Browse the menu and add items</div></div>`;
    totals.style.display = 'none';
    checkout.style.display = 'none';
    loginPrompt.style.display = 'none';
    restName.style.display = 'none';
    return;
  }

  body.innerHTML = items.map(i => `
    <div class="cart-item-row">
      <span class="ci-name" title="${i.name}">${i.name}</span>
      <span class="ci-qty">×${i.qty}</span>
      <span class="ci-price">₹${(i.price * i.qty).toFixed(0)}</span>
      <button class="ci-remove" onclick="changeQty(${i.id},-999)" title="Remove">✕</button>
    </div>`).join('');

  document.getElementById('subtotal').textContent = '₹' + subtotal;
  document.getElementById('tax').textContent = '₹' + tax;
  document.getElementById('grand-total').textContent = '₹' + total;

  totals.style.display = 'block';
  restName.style.display = 'block';

  // Show checkout or login prompt based on auth state
  if (isLoggedIn) {
    checkout.style.display = 'flex';
    loginPrompt.style.display = 'none';
  } else {
    checkout.style.display = 'none';
    loginPrompt.style.display = 'block';
  }
}

// ── Save cart to sessionStorage and redirect to login ──
function saveCartAndRedirectToLogin() {
  sessionStorage.setItem('savor_pending_cart', JSON.stringify(cart));
  sessionStorage.setItem('savor_redirect_after_login', window.location.href);
  window.location.href = 'login.html';
}

// ── Restore cart saved before login redirect ──
function restorePendingCart() {
  const saved = sessionStorage.getItem('savor_pending_cart');
  if (!saved) return;
  try {
    const savedCart = JSON.parse(saved);
    Object.assign(cart, savedCart);
    sessionStorage.removeItem('savor_pending_cart');
  } catch {}
}

// ── Place Order ──
async function placeOrder() {
  // Belt-and-suspenders auth guard
  if (!isLoggedIn || !user?.id) {
    saveCartAndRedirectToLogin();
    return;
  }

  const paymentMethod = document.getElementById('payment-method').value;
  const alertEl = document.getElementById('order-alert');
  const items = Object.values(cart);

  if (!items.length) {
    alertEl.textContent = 'Your cart is empty';
    alertEl.className = 'alert show alert-error'; return;
  }

  const btn = document.getElementById('place-btn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner" style="width:16px;height:16px;border-width:2px;display:inline-block"></span> Placing...';

  const body = {
    customerId: user.id,   // always from localStorage — no manual input
    restaurantId,
    paymentMethod,
    items: items.map(i => ({ menuItemId: i.id, quantity: i.qty }))
  };

  try {
    const { ok, data } = await api('POST', '/order/place', body);
    if (ok) {
      document.getElementById('cart-checkout').style.display = 'none';
      document.getElementById('cart-totals').style.display = 'none';
      document.getElementById('cart-body').style.display = 'none';
      document.getElementById('cart-rest-name').style.display = 'none';
      document.getElementById('order-success').style.display = 'block';
      document.getElementById('os-sub').textContent = `Order #${data.data?.id} confirmed! Estimated delivery in 30–45 mins.`;
      showToast('🎉 Order placed successfully!', 'success');
    } else {
      alertEl.textContent = data.message || 'Order failed. Please try again.';
      alertEl.className = 'alert show alert-error';
      btn.disabled = false; btn.textContent = 'Place Order →';
    }
  } catch {
    alertEl.textContent = 'Cannot connect to server';
    alertEl.className = 'alert show alert-error';
    btn.disabled = false; btn.textContent = 'Place Order →';
  }
}

function resetOrder() {
  cart = {};
  document.getElementById('cart-body').style.display = 'block';
  document.getElementById('cart-rest-name').style.display = 'none';
  document.getElementById('order-success').style.display = 'none';
  document.getElementById('cart-checkout').style.display = 'none';
  document.getElementById('cart-login-prompt').style.display = 'none';
  document.getElementById('cart-totals').style.display = 'none';
  document.getElementById('order-alert').className = 'alert';
  document.getElementById('place-btn').disabled = false;
  document.getElementById('place-btn').textContent = 'Place Order →';
  updateCart();
  renderItems(allItems);
}

restorePendingCart();   // merge any cart saved before login redirect
loadRestaurant();
loadMenu();
</script>
</body>
</html>
