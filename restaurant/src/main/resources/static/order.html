<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Savor — Place Order</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--cream:#FDF6EC;--dark:#1A1008;--amber:#C8762A;--amber-light:#E8A94A;--rust:#8B3A1A;--warm-gray:#8A7A6A;--font-display:'Playfair Display',serif;--font-body:'DM Sans',sans-serif}
body{background:var(--cream);font-family:var(--font-body)}
nav{padding:1.2rem 3rem;display:flex;justify-content:space-between;align-items:center;background:rgba(253,246,236,0.95);border-bottom:1px solid rgba(200,118,42,0.15);position:sticky;top:0;z-index:10}
.nav-logo{font-family:var(--font-display);font-size:1.6rem;font-weight:900;color:var(--dark);text-decoration:none}
.nav-logo span{color:var(--amber)}
.layout{display:grid;grid-template-columns:1fr 380px;gap:2rem;max-width:1200px;margin:2rem auto;padding:0 2rem}
.section-title{font-family:var(--font-display);font-size:1.6rem;margin-bottom:1.5rem}
.category-tabs{display:flex;gap:0.5rem;margin-bottom:1.5rem;flex-wrap:wrap}
.cat-tab{padding:0.4rem 1rem;border:1px solid rgba(200,118,42,0.3);border-radius:20px;cursor:pointer;font-size:0.82rem;color:var(--warm-gray);background:white;transition:all 0.2s}
.cat-tab.active,.cat-tab:hover{background:var(--amber);color:white;border-color:var(--amber)}
.menu-list{display:flex;flex-direction:column;gap:1rem}
.menu-card{background:white;border-radius:4px;padding:1.2rem;display:flex;justify-content:space-between;align-items:center;border:1px solid rgba(200,118,42,0.1);transition:border-color 0.2s}
.menu-card:hover{border-color:rgba(200,118,42,0.3)}
.menu-info{}
.menu-name{font-weight:500;font-size:0.95rem;margin-bottom:0.25rem}
.menu-desc{color:var(--warm-gray);font-size:0.8rem;margin-bottom:0.5rem}
.menu-price{color:var(--amber);font-weight:500;font-size:0.95rem}
.qty-ctrl{display:flex;align-items:center;gap:0.5rem}
.qty-btn{width:28px;height:28px;border-radius:50%;border:1.5px solid var(--amber);background:transparent;color:var(--amber);cursor:pointer;font-size:1rem;display:flex;align-items:center;justify-content:center;font-family:var(--font-body)}
.qty-btn:hover{background:var(--amber);color:white}
.qty-num{width:24px;text-align:center;font-size:0.9rem;font-weight:500}
.cart-panel{background:white;border-radius:6px;padding:1.5rem;border:1px solid rgba(200,118,42,0.15);height:fit-content;position:sticky;top:80px}
.cart-title{font-family:var(--font-display);font-size:1.2rem;margin-bottom:1.2rem;display:flex;justify-content:space-between;align-items:center}
.cart-count{background:var(--amber);color:white;width:22px;height:22px;border-radius:50%;font-size:0.75rem;display:flex;align-items:center;justify-content:center}
.cart-items{min-height:100px;max-height:280px;overflow-y:auto;margin-bottom:1rem}
.cart-item{display:flex;justify-content:space-between;padding:0.6rem 0;border-bottom:1px solid rgba(200,118,42,0.1);font-size:0.85rem}
.cart-item:last-child{border-bottom:none}
.cart-item-name{color:var(--dark)}
.cart-item-price{color:var(--amber);font-weight:500}
.cart-empty{text-align:center;color:var(--warm-gray);font-size:0.85rem;padding:2rem 0}
.cart-divider{border:none;border-top:1.5px solid rgba(200,118,42,0.15);margin:1rem 0}
.cart-row{display:flex;justify-content:space-between;font-size:0.88rem;margin-bottom:0.4rem}
.cart-total{font-family:var(--font-display);font-size:1.2rem;font-weight:700;color:var(--amber)}
.checkout-form{margin-top:1.2rem}
.form-group{margin-bottom:0.8rem}
.form-group label{display:block;font-size:0.75rem;font-weight:500;text-transform:uppercase;letter-spacing:0.05em;margin-bottom:0.3rem;color:var(--dark)}
.form-group input,.form-group select{width:100%;padding:0.6rem 0.8rem;border:1.5px solid rgba(200,118,42,0.2);border-radius:3px;font-family:var(--font-body);font-size:0.88rem;outline:none}
.form-group input:focus,.form-group select:focus{border-color:var(--amber)}
.btn-place{width:100%;padding:0.85rem;background:var(--amber);color:white;border:none;border-radius:3px;cursor:pointer;font-family:var(--font-display);font-size:1rem;font-weight:700;transition:background 0.2s;margin-top:0.5rem}
.btn-place:hover{background:var(--rust)}
.resp-box{margin-top:0.8rem;padding:0.7rem;border-radius:3px;font-size:0.82rem;display:none}
.resp-box.s{background:#F0FDF4;color:#166534}.resp-box.e{background:#FEF2F2;color:#991B1B}
.loading{text-align:center;padding:3rem;color:var(--warm-gray)}
</style>
</head>
<body>
<nav>
  <a href="index.html" class="nav-logo">Sav<span>or</span></a>
  <a href="restaurants.html" style="color:var(--amber);text-decoration:none;font-size:0.9rem">← Back to Restaurants</a>
</nav>

<div class="layout">
  <div>
    <div class="section-title" id="page-title">Menu</div>
    <div class="category-tabs" id="category-tabs"></div>
    <div class="menu-list" id="menu-list"><div class="loading">Loading menu...</div></div>
  </div>
  <div class="cart-panel">
    <div class="cart-title">Your Cart <div class="cart-count" id="cart-count">0</div></div>
    <div class="cart-items" id="cart-items"><div class="cart-empty">Add items to get started</div></div>
    <hr class="cart-divider">
    <div class="cart-row"><span>Subtotal</span><span id="subtotal">₹0</span></div>
    <div class="cart-row"><span>Delivery</span><span>₹40</span></div>
    <div class="cart-row"><span style="font-weight:500">Total</span><span class="cart-total" id="total">₹40</span></div>
    <div class="checkout-form">
      <div class="form-group"><label>Customer ID</label><input id="customerId" placeholder="Enter your customer ID" type="number"></div>
      <div class="form-group">
        <label>Payment Method</label>
        <select id="paymentMethod">
          <option value="UPI">UPI</option>
          <option value="CREDIT_CARD">Credit Card</option>
          <option value="DEBIT_CARD">Debit Card</option>
          <option value="CASH">Cash</option>
          <option value="NET_BANKING">Net Banking</option>
        </select>
      </div>
      <button class="btn-place" onclick="placeOrder()">Place Order</button>
      <div class="resp-box" id="resp-box"></div>
    </div>
  </div>
</div>

<script>
const BASE = 'http://localhost:8080';
const params = new URLSearchParams(window.location.search);
const restaurantId = params.get('restaurantId') || 1;
let cart = {};
let menuItems = [];

async function loadMenu() {
  try {
    const res = await fetch(`${BASE}/menu/restaurant/${restaurantId}`);
    const data = await res.json();
    menuItems = data.data || [];
    document.getElementById('page-title').textContent = 'Menu — Restaurant #' + restaurantId;

    const categories = [...new Set(menuItems.map(i => i.category?.name || 'All'))];
    const catDiv = document.getElementById('category-tabs');
    catDiv.innerHTML = ['All', ...categories].map((c,i) =>
      `<div class="cat-tab ${i===0?'active':''}" onclick="filterCat('${c}',this)">${c}</div>`
    ).join('');
    renderMenu(menuItems);
  } catch(e) {
    document.getElementById('menu-list').innerHTML = '<div class="loading">Could not load menu. Check backend connection.</div>';
  }
}

function filterCat(cat, btn) {
  document.querySelectorAll('.cat-tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  const filtered = cat === 'All' ? menuItems : menuItems.filter(i => (i.category?.name || 'All') === cat);
  renderMenu(filtered);
}

function renderMenu(items) {
  const list = document.getElementById('menu-list');
  if (!items.length) { list.innerHTML = '<div class="loading">No items in this category</div>'; return; }
  list.innerHTML = items.map(item => `
    <div class="menu-card">
      <div class="menu-info">
        <div class="menu-name">${item.name} ${!item.available?'<span style="color:#ef4444;font-size:0.75rem">(Unavailable)</span>':''}</div>
        <div class="menu-desc">${item.description || ''}</div>
        <div class="menu-price">₹${item.price}</div>
      </div>
      <div class="qty-ctrl" id="ctrl-${item.id}">
        ${cart[item.id] ? `
          <button class="qty-btn" onclick="updateQty(${item.id},-1)">−</button>
          <span class="qty-num">${cart[item.id].qty}</span>
          <button class="qty-btn" onclick="updateQty(${item.id},1)">+</button>
        ` : `<button class="qty-btn" onclick="addToCart(${item.id},'${item.name}',${item.price})" ${!item.available?'disabled':''} style="width:auto;padding:0 1rem;border-radius:2px;border-radius:2px">Add</button>`}
      </div>
    </div>`).join('');
}

function addToCart(id, name, price) {
  cart[id] = { id, name, price, qty: 1 };
  updateCartUI();
  renderMenu(menuItems);
}

function updateQty(id, delta) {
  if (!cart[id]) return;
  cart[id].qty += delta;
  if (cart[id].qty <= 0) delete cart[id];
  updateCartUI();
  renderMenu(menuItems);
}

function updateCartUI() {
  const items = Object.values(cart);
  const count = items.reduce((s, i) => s + i.qty, 0);
  const subtotal = items.reduce((s, i) => s + i.price * i.qty, 0);
  document.getElementById('cart-count').textContent = count;
  document.getElementById('subtotal').textContent = '₹' + subtotal;
  document.getElementById('total').textContent = '₹' + (subtotal + 40);
  const cartDiv = document.getElementById('cart-items');
  if (!items.length) { cartDiv.innerHTML = '<div class="cart-empty">Add items to get started</div>'; return; }
  cartDiv.innerHTML = items.map(i => `
    <div class="cart-item">
      <span class="cart-item-name">${i.name} × ${i.qty}</span>
      <span class="cart-item-price">₹${(i.price * i.qty).toFixed(0)}</span>
    </div>`).join('');
}

async function placeOrder() {
  const customerId = parseInt(document.getElementById('customerId').value);
  if (!customerId) { showResp('Enter your customer ID', 'e'); return; }
  if (!Object.keys(cart).length) { showResp('Add items to your cart first', 'e'); return; }
  const body = {
    customerId,
    restaurantId: parseInt(restaurantId),
    paymentMethod: document.getElementById('paymentMethod').value,
    items: Object.values(cart).map(i => ({ menuItemId: i.id, quantity: i.qty }))
  };
  try {
    const res = await fetch(`${BASE}/order/place`, { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(body) });
    const data = await res.json();
    if (res.ok) { showResp('✓ Order placed! Order ID: #' + data.data?.id, 's'); cart = {}; updateCartUI(); }
    else showResp(data.message || 'Order failed', 'e');
  } catch(e) { showResp('Cannot connect to server', 'e'); }
}

function showResp(msg, type) {
  const el = document.getElementById('resp-box');
  el.textContent = msg; el.className = 'resp-box ' + type; el.style.display = 'block';
}

loadMenu();
</script>
</body>
</html>
